baseURL: "https://M0nkeyFl0wer.github.io/benwest-blog/"
title: "Ben West"
theme: "hugo-theme-stack"
defaultContentLanguage: "en"
enableRobotsTXT: true

params:
  mainSections:
    - posts
  favicon: "/favicon.ico"
  footer:
    since: 2025
    customText: "Made with Hugo and the Stack theme"
  sidebar:
    subtitle: "Campaigns, code, and critique"
    avatar:
      enabled: true
      local: true
      src: "/images/avatar.png"
  social:
    - name: Bluesky
      icon: bsky
      url: "https://bsky.app/profile/benwest.bsky.social"

markup:
  highlight:
    noClasses: false
